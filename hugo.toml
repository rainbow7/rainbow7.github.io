baseURL = "https://rainbow7.github.io/"
locale = "zh-cn"
defaultContentLanguage = "zh-cn"
title = "Yuming's Blog"
theme = "even"

enableRobotsTXT = true
enableEmoji = true
hasCJKLanguage = true
paginate = 10

[author]
  name = "Yuming"

[sitemap]
  changefreq = "weekly"
  priority = 0.5
  filename = "sitemap.xml"

[[menu.main]]
  name = "首页"
  weight = 10
  identifier = "home"
  url = "/"

[[menu.main]]
  name = "归档"
  weight = 20
  identifier = "archives"
  url = "/post/"

[[menu.main]]
  name = "标签"
  weight = 30
  identifier = "tags"
  url = "/tags/"

[[menu.main]]
  name = "分类"
  weight = 40
  identifier = "categories"
  url = "/categories/"

[params]
  version = "4.x"
  debug = false
  since = "2026"
  logoTitle = "Yuming's Blog"
  keywords = ["blog", "Hugo"]
  description = "Yuming 的个人博客"

  archivePaginate = 50
  showArchiveCount = true
  dateFormatToUse = "2006-01-02"
  moreMeta = true

  toc = true
  autoCollapseToc = false
  fancybox = true

  postMetaInFooter = true
  linkToMarkDown = false

  highlightInClient = false

  customCSS = []
  customJS = []

  uglyURLs = false

  [params.busuanzi]
    enable = false

  [params.social]
    g-github = "https://github.com/rainbow7"

[privacy]
  [privacy.googleAnalytics]
    anonymizeIP = true
  [privacy.youtube]
    privacyEnhanced = true

[markup]
  [markup.tableOfContents]
    startLevel = 1
  [markup.goldmark.renderer]
    unsafe = true
  [markup.highlight]
    style = "monokai"
    lineNos = true
    guessSyntax = true
