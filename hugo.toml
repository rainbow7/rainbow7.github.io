baseURL = "https://rainbow7.github.io/"
theme = "mana"
defaultContentLanguage = "zh-cn"

hasCJKLanguage = true
enableRobotsTXT = true
enableEmoji = true

[pagination]
  pageSize = 10

[markup]
  [markup.tableOfContents]
    startLevel = 1
    endLevel = 6
    ordered = false
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
    [markup.goldmark.parser]
      [markup.goldmark.parser.attribute]
        block = true
        title = true
  [markup.highlight]
    codeFences = true
    guessSyntax = true
    noClasses = false
    style = "catppuccin-macchiato"

[outputs]
  home = ["HTML", "JSON"]

[sitemap]
  changefreq = "weekly"
  priority = 0.5
  filename = "sitemap.xml"

[params]
  enableIntegrity = false
  relatedPostsCount = 3
  description = "Yuming 的个人博客"
  author = "Yuming"
  heroTitleLine1 = "YUMING'S BLOG"
  heroTitleLine2 = "Code & Life"
  footerText = "Built with Hugo and Mana theme"

  [params.social]
    github = "https://github.com/rainbow7"

  [params.buyMeACoffee]
    enabled = false

  [params.codeHighlight]
    darkTheme = "catppuccin-macchiato"
    lightTheme = "catppuccin-frappe"

  [params.copyright]
    startYear = 2026
    owner = "Yuming"

  [params.admonitions]
    alertStyle = "favicon"

[[menus.main]]
  name = "首页"
  pageRef = "/"
  weight = 10

[[menus.main]]
  name = "文章"
  pageRef = "/posts"
  weight = 20

[[menus.main]]
  name = "标签"
  pageRef = "/tags"
  weight = 30

[[menus.main]]
  name = "关于"
  url = "/about/"
  weight = 40

[privacy]
  [privacy.googleAnalytics]
    anonymizeIP = true
  [privacy.youtube]
    privacyEnhanced = true
